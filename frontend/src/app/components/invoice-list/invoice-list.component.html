<div class="flex justify-between items-center mb-8">
  <div>
    <h2 class="text-3xl font-bold">Invoices</h2>
    <p class="text-gray-500">Track and manage your corporate billing history.</p>
  </div>
  <button routerLink="/invoices/new" class="bg-[#22c55e] text-white px-6 py-2 rounded-full font-bold hover:bg-green-600 transition">
    Create Invoice
  </button>
</div>

<div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
  <table class="w-full text-left">
    <thead class="bg-gray-50 text-xs text-gray-400 uppercase">
      <tr>
        <th class="px-6 py-3">Invoice #</th>
        <th class="px-6 py-3">Client</th>
        <th class="px-6 py-3">Amount</th>
        <th class="px-6 py-3">Status</th>
        <th class="px-6 py-3">Due Date</th>
        <th class="px-6 py-3 text-right">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let inv of invoices" class="border-t hover:bg-gray-50 transition">
        <td class="px-6 py-4 font-semibold text-gray-900">{{ inv.invoiceNumber }}</td>
        <td class="px-6 py-4">{{ inv.client?.name }}</td>
        <td class="px-6 py-4">{{ inv.totalAmountGross | currency:'USD' }}</td>
        <td class="px-6 py-4">
          <span [ngClass]="{
            'bg-green-100 text-green-700': inv.status === 'Paid',
            'bg-yellow-100 text-yellow-700': inv.status === 'Sent',
            'bg-gray-100 text-gray-600': inv.status === 'Draft'
          }" class="px-3 py-1 rounded-full text-xs font-medium">
            {{ inv.status }}
          </span>
        </td>
        <td class="px-6 py-4">{{ inv.dueDate | date:'mediumDate' }}</td>
        <td class="px-6 py-4 text-right">
          <button (click)="deleteInvoice(inv.id)" class="text-red-500 hover:text-red-700 font-medium transition" [attr.aria-label]="'Delete invoice ' + inv.invoiceNumber">
            Delete
          </button>
        </td>
      </tr>
      <tr *ngIf="invoices.length === 0">
        <td colspan="6" class="px-6 py-8 text-center text-gray-500">No invoices found.</td>
      </tr>
    </tbody>
  </table>
</div>
