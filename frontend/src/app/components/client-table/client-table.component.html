<div class="flex justify-between items-center mb-8">
  <div>
    <h2 class="text-3xl font-bold">Clients</h2>
    <p class="text-gray-500">Manage your corporate relationships and billing history.</p>
  </div>
  <button routerLink="/clients/new" class="bg-[#22c55e] text-white px-6 py-2 rounded-full ">
  Add Client
</button>
</div>

<div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex gap-4">
  <div class="relative flex-1">
    <i-lucide name="search" class="absolute left-3 top-3 text-gray-400 w-5 h-5"></i-lucide>
    <input type="text" [(ngModel)]="searchTerm" 
           placeholder="Search clients, email, company, or address..." 
           class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-blue-500">
  </div>
  <button class="border px-4 py-2 rounded-lg flex items-center gap-2 text-gray-600">
    <i-lucide name="filter"></i-lucide> Filter
  </button>
</div>
<div class="bg-white rounded-xl shadow-sm overflow-hidden">
  <table class="w-full text-left">
    <thead class="bg-gray-50 text-xs text-gray-400 uppercase">
      <tr>
        <th class="px-6 py-3">Client Name</th>
        <th class="px-6 py-3">Email</th>
        <th class="px-6 py-3">Company</th>
        <th class="px-6 py-3 w-32">Address</th>
        <th class="px-6 py-3 w-24"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let client of filteredClients" class="border-t hover:bg-gray-50 transition">
        <td class="px-6 py-4">{{ client.name }}</td>
        <td class="px-6 py-4">{{ client.email }}</td>
        <td class="px-6 py-4">{{ client.company }}</td>
        <td class="px-6 py-4">{{ client.address }}</td>
        
        <td class="px-6 py-4 text-center">
          <button class="text-blue-600 hover:text-blue-800">
            <i-lucide name="edit"></i-lucide>
          </button>
          <button class="text-red-400 hover:text-red-600 ml-2">
            <i-lucide name="trash-2"></i-lucide>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
